<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f0d09">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>🔮 Crystal Ball — World Cup 2026 Oracle</title>
<meta name="description" content="The world's most insightful World Cup 2026 predictor. Every match, every score, foreseen — with the reasoning behind every reading.">
<meta property="og:title" content="🔮 Crystal Ball — World Cup 2026 Oracle">
<meta property="og:description" content="Game-by-game score prophecies for every World Cup 2026 match. Make your own picks and battle the Oracle.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔮</text></svg>">
</head>
<body>
<div class="stars" aria-hidden="true"></div>

<header class="app-header">
  <button class="share-btn" id="shareBtn" aria-label="Share">⎋</button>
  <div class="orb" aria-hidden="true"></div>
  <div class="header-text">
    <h1>The Crystal Ball</h1>
    <p class="subtitle">World Cup MMXXVI · Almanac of Prophecies</p>
  </div>
</header>

<div class="score-strip" id="scoreStrip" hidden>
  <div class="score-pill oracle-pill">The Oracle <strong id="oraclePts">0</strong></div>
  <div class="score-vs">·</div>
  <div class="score-pill you-pill">You <strong id="youPts">0</strong></div>
</div>

<main id="view" class="view"></main>

<nav class="bottom-nav" aria-label="Main">
  <button data-view="today" class="nav-btn active"><span class="nav-ico">☉</span><span>Today</span></button>
  <button data-view="fixtures" class="nav-btn"><span class="nav-ico">☽</span><span>Matches</span></button>
  <button data-view="groups" class="nav-btn"><span class="nav-ico">♔</span><span>Groups</span></button>
  <button data-view="bracket" class="nav-btn"><span class="nav-ico">☍</span><span>Bracket</span></button>
  <button data-view="oracle" class="nav-btn"><span class="nav-ico">☿</span><span>Oracle</span></button>
</nav>

<div class="sheet-backdrop" id="sheetBackdrop" hidden></div>
<div class="sheet" id="sheet" hidden></div>

<script src="js/app.js"></script>
</body>
</html>
